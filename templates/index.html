<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetChat | NetG OS Dark</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --glass: rgba(255, 255, 255, 0.05); --accent: #8b5cf6; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 90%; max-width: 400px; background: var(--glass); backdrop-filter: blur(20px); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; height: 80vh; }
        .chat-box { flex: 1; overflow-y: auto; margin-bottom: 15px; padding: 10px; }
        .msg { background: rgba(255,255,255,0.08); padding: 10px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; }
        .msg b { color: #38bdf8; display: block; font-size: 11px; }
        .input-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; outline: none; }
        .btn { padding: 12px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        #chat-section { display: none; flex-direction: column; height: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align:center; color: #38bdf8;">NetChat</h2>
        
        <div id="auth-section" style="text-align:center; margin: auto 0;">
            <p style="color: #94a3b8;">NetGlobal Team xavfsiz chatiga xush kelibsiz</p>
            <button class="btn" onclick="login()">Google orqali kirish</button>
        </div>

        <div id="chat-section">
            <div class="chat-box" id="messages"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Xabar..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn" style="width: auto;" onclick="send()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqKqszWBCMrKIjN0Wb9PxC7wArkjd5FSU",
            authDomain: "netchat-52007.firebaseapp.com",
            databaseURL: "https://netchat-52007-default-rtdb.firebaseio.com",
            projectId: "netchat-52007",
            storageBucket: "netchat-52007.firebasestorage.app",
            messagingSenderId: "145404562699",
            appId: "1:145404562699:web:5eeb4c6abc3e18675b660e",
            measurementId: "G-YKM3J5YR9F"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then((res) => {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'flex';
                db.ref('active_users/' + res.user.uid).set({
                    name: res.user.displayName,
                    device: navigator.userAgent,
                    time: new Date().toLocaleString()
                });
            });
        }

        function send() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                db.ref('messages').push({
                    name: auth.currentUser.displayName,
                    text: input.value,
                    time: Date.now()
                });
                input.value = "";
            }
        }

        db.ref('messages').limitToLast(30).on('child_added', (snap) => {
            const m = snap.val();
            document.getElementById('messages').innerHTML += `<div class="msg"><b>${m.name}</b>${m.text}</div>`;
            const box = document.getElementById('messages');
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
